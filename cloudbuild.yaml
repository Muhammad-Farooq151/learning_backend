substitutions:
  _REGION: us-central1
  _SERVICE_NAME: learning-hub-backend
  _REPOSITORY: learning-hub

steps:
- name: "node:18-alpine"
  id: "install"
  entrypoint: npm
  args: [ "ci" ]

- name: "gcr.io/cloud-builders/docker"
  id: "build"
  args:
  - build
  - --tag
  - $_REGION-docker.pkg.dev/$PROJECT_ID/$_REPOSITORY/$_SERVICE_NAME:$COMMIT_SHA
  - --tag
  - $_REGION-docker.pkg.dev/$PROJECT_ID/$_REPOSITORY/$_SERVICE_NAME:latest
  - .
  waitFor: [ "install" ]

- name: "gcr.io/cloud-builders/docker"
  id: "push"
  args:
  - push
  - --all-tags
  - $_REGION-docker.pkg.dev/$PROJECT_ID/$_REPOSITORY/$_SERVICE_NAME
  waitFor: [ "build" ]

- name: "gcr.io/google.com/cloudsdktool/cloud-sdk"
  id: "deploy"
  entrypoint: gcloud
  args:
  - run
  - deploy
  - $_SERVICE_NAME
  - --image=$_REGION-docker.pkg.dev/$PROJECT_ID/$_REPOSITORY/$_SERVICE_NAME:$COMMIT_SHA
  - --region=$_REGION
  - --platform=managed
  - --allow-unauthenticated
  - --port=8080
  - --memory=1Gi
  - --cpu=1
  - --min-instances=1
  - --max-instances=10
  - --set-secrets=MONGODB_URI=MONGODB_URI:latest
  - --set-secrets=JWT_SECRET=JWT_SECRET:latest
  - --set-secrets=DATABASE_NAME=DATABASE_NAME:latest
  - --set-secrets=FRONTEND_URL=FRONTEND_URL:latest
  - --set-secrets=CLOUDINARY_CLOUD_NAME=CLOUDINARY_CLOUD_NAME:latest
  - --set-secrets=CLOUDINARY_API_KEY=CLOUDINARY_API_KEY:latest
  - --set-secrets=CLOUDINARY_API_SECRET=CLOUDINARY_API_SECRET:latest
  - --set-secrets=STRIPE_SECRET_KEY=STRIPE_SECRET_KEY:latest
  - --set-secrets=SMTP_HOST=SMTP_HOST:latest
  - --set-secrets=SMTP_PORT=SMTP_PORT:latest
  - --set-env-vars=NODE_ENV=production
  waitFor: [ "push" ]

options:
  logging: CLOUD_LOGGING_ONLY
  machineType: "E2_HIGHCPU_8"

timeout: "1200s"

images:
- $_REGION-docker.pkg.dev/$PROJECT_ID/$_REPOSITORY/$_SERVICE_NAME:$COMMIT_SHA
- $_REGION-docker.pkg.dev/$PROJECT_ID/$_REPOSITORY/$_SERVICE_NAME:latest
